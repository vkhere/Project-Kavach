threagile_version: 1.0.0

# ---------------------------------------------------------------------------
# Project KAVACH -- Threagile Threat Model
# Engagement: Meridian FinServe Two-Surface Security Assessment
# Surfaces:   Network Forensics (Workstream A) + Web App (Workstream B)
# ---------------------------------------------------------------------------

model_tracker:
  title: Project KAVACH -- Unified Threat Model
  author:
    name: Security Assessment Team
    homepage: https://github.com/vkhere/Project-Kavach
  date: 2026-06-13
  version: 1.0

overview:
  description: >
    Two-surface threat model for Meridian FinServe Pvt. Ltd. covering:
    (A) the internal network compromise chain (Trickbot + Cobalt Strike lateral
        movement from Workstation 10.5.26.132 to DC 10.5.26.4), and
    (B) the customer/partner web portal attack surface (DVWA + Juice Shop,
        representing the legacy intranet portal and the modern API portal).
    The model treats both surfaces as a single system -- a pivot from a web
    compromise can become observable at the network layer, and vice versa.

tags_available:
  - network
  - web
  - identity
  - data-exfiltration
  - lateral-movement
  - injection
  - broken-access-control
  - crypto-failure
  - auth-failure
  - c2

# ---------------------------------------------------------------------------
# DATA ASSETS
# ---------------------------------------------------------------------------
data_assets:

  ad_credentials:
    id: ad_credentials
    title: Active Directory Domain Credentials
    description: >
      Master credentials (username + NTLM hash) for domain administrator
      accounts on the Meridian FinServe AD infrastructure. Compromise grants
      full domain control. Evidence: Cobalt Strike lateral movement via
      svcctl RPC to DC (Frames 10799-10811, Workstream A).
    usage: devops
    tags: [network, identity]
    origin: Internal HR / IT provisioning
    owner: IT Operations
    quantity: few
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Loss of confidentiality leads to full domain compromise. Loss of
      integrity (tampering) enables backdoor account creation. Loss of
      availability locks out all users.

  customer_pii:
    id: customer_pii
    title: Customer PII (Names, Addresses, Phone Numbers)
    description: >
      Physical addresses, mobile numbers, and full names of Meridian FinServe
      customers stored in the portal database. Exposed via IDOR vulnerability
      on /api/Addresss/<id> endpoint (Finding F-03, Workstream B).
    usage: business
    tags: [web, broken-access-control]
    origin: Customer onboarding portal
    owner: Business Operations
    quantity: many
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      Exposure violates RBI customer data protection requirements. IDOR allows
      unauthenticated enumeration of all customer records.

  session_tokens:
    id: session_tokens
    title: Web Session Tokens (JWT + PHPSESSID)
    description: >
      Authentication session tokens for the customer portal. Stored XSS
      (Finding F-02) allows an attacker to exfiltrate PHPSESSID cookies via
      JavaScript fetch. Session ID also exposed in WebSocket URL parameters
      (Workstream B evidence screenshot 04).
    usage: business
    tags: [web, auth-failure]
    origin: Web application authentication layer
    owner: Application Team
    quantity: many
    confidentiality: strictly-confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      Stolen tokens allow full account hijacking without re-authentication.
      No token rotation or short expiry observed.

  c2_beacon_traffic:
    id: c2_beacon_traffic
    title: Cobalt Strike C2 Beacon Payload
    description: >
      Structured HTTPS beacon traffic from the compromised workstation and DC
      to external C2 servers (37.228.70.134). Periodic 202-second interval,
      missing SNI extension. Contains host profiling data, implant tasking,
      and exfiltrated credential hashes (Workstream A, Frames 791, 13300).
    usage: devops
    tags: [network, c2, data-exfiltration]
    origin: Trickbot/Cobalt Strike implant
    owner: Attacker (External)
    quantity: very-many
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Active exfiltration channel. Compromise of this traffic confirms full
      post-exploitation control of internal assets.

  portal_login_credentials:
    id: portal_login_credentials
    title: Portal Login Credentials (Plaintext over HTTP)
    description: >
      Admin and customer credentials transmitted in plaintext JSON body over
      unencrypted HTTP (Workstream B, Finding A02 -- Cryptographic Failures).
      Intercepted via Burp Suite showing admin@admin.com / admin@1.
    usage: business
    tags: [web, crypto-failure, auth-failure]
    origin: Customer login portal (/rest/user/login)
    owner: Application Team
    quantity: few
    confidentiality: strictly-confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      Plaintext transmission allows trivial MitM credential harvesting on any
      shared or monitored network segment.

# ---------------------------------------------------------------------------
# TECHNICAL ASSETS
# ---------------------------------------------------------------------------
technical_assets:

  user_workstation:
    id: user_workstation
    title: Infected User Workstation
    description: >
      Windows workstation at 10.5.26.132. Initial point of compromise.
      Trickbot payload executed, followed by Cobalt Strike staging. Initiated
      outbound C2 beaconing and lateral movement to the domain controller.
    type: client-system
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    technology: desktop
    tags: [network, lateral-movement]
    internet: false
    machine: physical
    encryption: none
    owner: IT Operations
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Compromise of this asset was the initial foothold for the entire attack
      chain including DC takeover.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: false
    data_assets_processed:
      - ad_credentials
      - c2_beacon_traffic
    data_assets_stored:
      - ad_credentials
    data_formats_accepted:
      - binary
      - file
    communication_links:
      workstation_to_dc_smb:
        target: domain_controller
        description: Direct SMB/RPC connection from workstation to DC (lateral movement)
        protocol: smb
        authentication: credentials
        authorization: technical-user
        tags: [network, lateral-movement]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: devops
        data_assets_sent:
          - ad_credentials
        data_assets_received:
          - ad_credentials
      workstation_to_c2:
        target: attacker_c2_server
        description: Outbound HTTPS beacon to Cobalt Strike C2 server
        protocol: https
        authentication: none
        authorization: none
        tags: [network, c2, data-exfiltration]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: devops
        data_assets_sent:
          - c2_beacon_traffic
        data_assets_received:
          - c2_beacon_traffic
      workstation_to_swg:
        target: secure_web_gateway
        description: Proposed post-hardening web proxy egress route
        protocol: https
        authentication: none
        authorization: none
        tags: [network]
        vpn: false
        ip_filtered: true
        readonly: false
        usage: business
        data_assets_sent: []
        data_assets_received: []

  domain_controller:
    id: domain_controller
    title: Active Directory Domain Controller
    description: >
      Windows Server at 10.5.26.4. Governs all user authentication and
      group policy for Meridian FinServe. Compromised via RPC service
      creation (svcctl) from the infected workstation. Subsequently began
      independent C2 beaconing -- confirming complete domain compromise.
    type: server
    usage: devops
    used_as_client_by_human: false
    out_of_scope: false
    technology: active-directory
    tags: [network, identity, lateral-movement]
    internet: false
    machine: physical
    encryption: none
    owner: IT Operations
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Full domain controller compromise = full Active Directory takeover.
      All internal systems trust the DC for authentication decisions.
    multi_tenant: false
    redundancy: high
    custom_developed_parts: false
    data_assets_processed:
      - ad_credentials
      - c2_beacon_traffic
    data_assets_stored:
      - ad_credentials
    data_formats_accepted:
      - binary
    communication_links:
      dc_to_c2:
        target: attacker_c2_server
        description: DC began outbound C2 beaconing post-lateral movement compromise
        protocol: https
        authentication: none
        authorization: none
        tags: [network, c2, data-exfiltration]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: devops
        data_assets_sent:
          - c2_beacon_traffic
        data_assets_received:
          - c2_beacon_traffic

  jump_host:
    id: jump_host
    title: Hardened Jump Host
    description: >
      Proposed hardened bastion host in the Management VLAN. Acts as the
      only permitted path from User Workstation VLAN to the Restricted Server
      VLAN (DC). Requires MFA for all inbound RDP/SSH connections. All
      sessions are recorded. Proposed as remediation for the flat-network
      lateral movement finding (Workstream A).
    type: server
    usage: devops
    used_as_client_by_human: true
    out_of_scope: false
    technology: bastion
    tags: [network, identity]
    internet: false
    machine: virtual
    encryption: ephemeral-keys
    owner: IT Operations
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Single choke point for all privileged administrative access. Compromise
      of this asset bypasses all east-west segmentation controls.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: false
    data_assets_processed:
      - ad_credentials
    data_assets_stored: []
    data_formats_accepted:
      - binary
    communication_links:
      jump_to_dc:
        target: domain_controller
        description: Monitored and MFA-authenticated administrative path to DC
        protocol: smb
        authentication: credentials
        authorization: technical-user
        tags: [network, identity]
        vpn: false
        ip_filtered: true
        readonly: false
        usage: devops
        data_assets_sent:
          - ad_credentials
        data_assets_received:
          - ad_credentials

  secure_web_gateway:
    id: secure_web_gateway
    title: Secure Web Gateway (SWG) / Egress Proxy
    description: >
      Proposed inline TLS-decrypting proxy that filters all outbound HTTP/HTTPS
      traffic from the User Workstation VLAN. Blocks unknown or threat-intel-
      flagged domains (including C2 IPs). Enforces category-based URL filtering.
      Prevents direct outbound HTTPS C2 beaconing observed in Workstream A.
    type: web-server
    usage: devops
    used_as_client_by_human: false
    out_of_scope: false
    technology: web-service-rest
    tags: [network]
    internet: true
    machine: virtual
    encryption: tls
    owner: IT Operations
    confidentiality: confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Failure of SWG allows direct C2 beaconing and data exfiltration to bypass
      the perimeter. Must maintain high availability for business continuity.
    multi_tenant: false
    redundancy: high
    custom_developed_parts: false
    data_assets_processed: []
    data_assets_stored: []
    data_formats_accepted:
      - binary
    communication_links:
      swg_to_internet:
        target: attacker_c2_server
        description: Inspected egress -- C2-bound traffic blocked by threat intel feed
        protocol: https
        authentication: none
        authorization: none
        tags: [network]
        vpn: false
        ip_filtered: true
        readonly: true
        usage: devops
        data_assets_sent: []
        data_assets_received: []

  dvwa_portal:
    id: dvwa_portal
    title: DVWA -- Legacy Intranet Banking Portal
    description: >
      Damn Vulnerable Web Application simulating the legacy PHP-based intranet
      banking portal. Running on Docker at localhost:8080. Contains SQL Injection
      (F-01) on the login endpoint and Stored XSS (F-02) on the Guestbook page.
    type: web-application
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    technology: web-application
    tags: [web, injection]
    internet: false
    machine: container
    encryption: none
    owner: Application Team
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      SQL Injection allows full database dump. Stored XSS allows session
      cookie theft and account hijacking of all portal users.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: true
    data_assets_processed:
      - session_tokens
      - portal_login_credentials
      - customer_pii
    data_assets_stored:
      - customer_pii
      - portal_login_credentials
    data_formats_accepted:
      - json
      - form
    communication_links:
      dvwa_to_db:
        target: portal_database
        description: PHP application queries MySQL database (SQLi-vulnerable)
        protocol: jdbc
        authentication: credentials
        authorization: technical-user
        tags: [web, injection]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - customer_pii
          - portal_login_credentials
        data_assets_received:
          - customer_pii
          - portal_login_credentials

  juice_shop_portal:
    id: juice_shop_portal
    title: Juice Shop -- Modern API-Driven Customer Portal
    description: >
      OWASP Juice Shop simulating the modern JavaScript/Node.js API-driven
      customer and partner portal. Running on Docker at localhost:3000.
      Contains IDOR on /api/Addresss/<id> (F-03), weak/default credentials
      (A07), and plaintext credential transmission over HTTP (A02).
    type: web-application
    usage: business
    used_as_client_by_human: true
    out_of_scope: false
    technology: web-service-rest
    tags: [web, broken-access-control, auth-failure, crypto-failure]
    internet: true
    machine: container
    encryption: none
    owner: Application Team
    confidentiality: confidential
    integrity: critical
    availability: operational
    justification_cia_rating: >
      IDOR exposes all customer PII. No HTTPS means all credentials and
      session data are trivially interceptable on any shared network.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: true
    data_assets_processed:
      - customer_pii
      - session_tokens
      - portal_login_credentials
    data_assets_stored:
      - customer_pii
      - portal_login_credentials
    data_formats_accepted:
      - json
    communication_links:
      juice_to_db:
        target: portal_database
        description: Node.js Sequelize ORM queries to portal database
        protocol: jdbc
        authentication: credentials
        authorization: technical-user
        tags: [web]
        vpn: false
        ip_filtered: false
        readonly: false
        usage: business
        data_assets_sent:
          - customer_pii
        data_assets_received:
          - customer_pii

  portal_database:
    id: portal_database
    title: Customer Portal Database (MySQL)
    description: >
      MySQL database backing both the DVWA intranet portal and the Juice Shop
      customer portal. Stores customer PII, session data, and hashed passwords.
      Directly targeted by SQL Injection (F-01) and IDOR (F-03) attacks.
    type: datastore
    usage: business
    used_as_client_by_human: false
    out_of_scope: false
    technology: database
    tags: [web, injection]
    internet: false
    machine: container
    encryption: none
    owner: Application Team
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Contains all customer PII and credential hashes. SQL Injection allows
      full data exfiltration in a single crafted query.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: false
    data_assets_processed:
      - customer_pii
      - portal_login_credentials
    data_assets_stored:
      - customer_pii
      - portal_login_credentials
    data_formats_accepted:
      - json
    communication_links: {}

  attacker_c2_server:
    id: attacker_c2_server
    title: Attacker C2 and Exfiltration Server (External)
    description: >
      External malicious server at 37.228.70.134 (primary C2) and
      36.95.27.243 / 103.102.220.50 (exfiltration endpoints). Receives
      Cobalt Strike HTTPS beacons from both the compromised workstation and
      the domain controller. Also received HTTP POST data exfiltration
      packets containing host profiling and credential hashes.
    type: external-system
    usage: devops
    used_as_client_by_human: false
    out_of_scope: false
    technology: web-service-rest
    tags: [network, c2, data-exfiltration]
    internet: true
    machine: serverless
    encryption: tls
    owner: Attacker (External Threat Actor)
    confidentiality: strictly-confidential
    integrity: critical
    availability: critical
    justification_cia_rating: >
      Out-of-scope threat actor infrastructure. Included as a technical asset
      to model the bidirectional C2 channel and show the exfiltration data flow.
    multi_tenant: false
    redundancy: none
    custom_developed_parts: false
    data_assets_processed:
      - c2_beacon_traffic
    data_assets_stored:
      - c2_beacon_traffic
      - ad_credentials
    data_formats_accepted:
      - binary
      - json
    communication_links: {}

# ---------------------------------------------------------------------------
# TRUST BOUNDARIES
# ---------------------------------------------------------------------------
trust_boundaries:

  internet_untrusted:
    id: internet_untrusted
    title: Internet (Untrusted Zone)
    description: >
      All external IP space. Contains the attacker C2/exfil servers.
      No trust. All inbound and outbound connections must be explicitly
      whitelisted by the NGFW and SWG.
    type: network-cloud-security-group
    tags: [network]
    technical_assets_inside:
      - attacker_c2_server
    trust_boundaries_nested: []

  user_workstation_vlan:
    id: user_workstation_vlan
    title: User Workstation VLAN (Low Trust)
    description: >
      VLAN segment hosting user endpoints. Low trust -- devices are
      susceptible to phishing and drive-by compromise. Must not have
      direct access to the Restricted Server VLAN.
    type: network-dedicated
    tags: [network]
    technical_assets_inside:
      - user_workstation
    trust_boundaries_nested: []

  management_vlan:
    id: management_vlan
    title: Management VLAN (Medium-High Trust)
    description: >
      Isolated VLAN for privileged administrative access only. Contains
      the hardened Jump Host. All sessions are MFA-gated and recorded.
      Access to this VLAN from the User Workstation VLAN requires explicit
      RDP/SSH with strong authentication.
    type: network-dedicated
    tags: [network, identity]
    technical_assets_inside:
      - jump_host
    trust_boundaries_nested: []

  restricted_server_vlan:
    id: restricted_server_vlan
    title: Restricted Server VLAN (High Trust)
    description: >
      Most sensitive VLAN. Contains Active Directory Domain Controllers and
      core financial infrastructure. Zero direct access from User Workstation
      VLAN. Incoming connections permitted only from the Management VLAN
      Jump Host on explicitly allowed ports.
    type: network-dedicated
    tags: [network, identity]
    technical_assets_inside:
      - domain_controller
    trust_boundaries_nested: []

  perimeter_security_zone:
    id: perimeter_security_zone
    title: Perimeter Security Zone (DMZ)
    description: >
      Hosts the Secure Web Gateway and the NGFW. Inspects and filters
      all traffic leaving the internal network toward the internet.
      Enforces egress policy (default-deny outbound except SWG proxy).
    type: network-dedicated
    tags: [network]
    technical_assets_inside:
      - secure_web_gateway
    trust_boundaries_nested: []

  web_application_dmz:
    id: web_application_dmz
    title: Web Application DMZ
    description: >
      Docker-hosted environment containing DVWA and Juice Shop portals
      and the backing MySQL database. Currently isolated to localhost
      in the test environment. In production, this represents the
      customer-facing portal infrastructure.
    type: network-dedicated
    tags: [web]
    technical_assets_inside:
      - dvwa_portal
      - juice_shop_portal
      - portal_database
    trust_boundaries_nested: []

# ---------------------------------------------------------------------------
# SHARED RUNTIMES
# ---------------------------------------------------------------------------
shared_runtimes:
  docker_compose_env:
    id: docker_compose_env
    title: Docker Compose Test Environment
    description: >
      Local Docker Compose environment reproducing DVWA and Juice Shop.
      Spun up via: docker-compose up -d in webapp/env/.
      Reproducible in under 15 minutes per engagement brief requirements.
    tags: [web]
    technical_assets_running:
      - dvwa_portal
      - juice_shop_portal
      - portal_database
