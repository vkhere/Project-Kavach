version: '3.8'

services:
  # Damn Vulnerable Web Application (DVWA)
  # Represents the traditional PHP-based banking-core administrative panel
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: kavach-dvwa
    ports:
      - "8080:80"
    restart: always
    environment:
      - DBMS_TYPE=mysql
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=kavach_db_pass
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # OWASP Juice Shop
  # Represents the modern, JavaScript-heavy, API-driven customer-facing portal
  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: kavach-juiceshop
    ports:
      - "3000:3000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── ENVIRONMENT REPRODUCIBILITY GUIDE ──────────────────────────────────
# To stand up the environment in under 15 minutes, follow these steps:
# 1. Ensure Docker Desktop is installed and running on your local machine.
# 2. Open a terminal and navigate to the directory containing this file:
#    cd webapp/env
# 3. Run the docker-compose command:
#    docker-compose up -d
# 4. Access the applications:
#    - DVWA: http://localhost:8080
#      (Credentials: admin / password. Click "Create / Reset Database" on first launch)
#    - Juice Shop: http://localhost:3000
#      (Seeded with standard challenges and vulnerabilities out-of-the-box)
# 5. To shut down the environment:
#    docker-compose down
